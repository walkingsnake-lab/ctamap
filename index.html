<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTA Train Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Jersey+25&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="cursor-light"></div>
  <div id="line-glow"></div>
  <button id="close-btn" aria-label="Close">&times;</button>
  <div id="welcome-hint" class="welcome-hidden">Press <kbd>S</kbd> or long-press to show stations</div>
  <div id="debug-overlay" class="debug-hidden">
    <div class="dbg-header">
      <span class="dbg-title">Train Debug</span>
      <span class="dbg-hint">D to close &nbsp;·&nbsp; <a href="/api/debug/trains" target="_blank">raw state</a></span>
    </div>
    <div class="dbg-summary" id="dbg-summary"></div>
    <div class="dbg-table-wrap">
      <table class="dbg-table" id="dbg-table">
        <thead><tr>
          <th>RN</th><th>Line</th><th>Dest</th><th>Dir</th><th>Method</th><th>Held</th><th>Station</th>
        </tr></thead>
        <tbody id="dbg-tbody"></tbody>
      </table>
    </div>
  </div>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="dist/bundle.min.js"></script>
</body>
</html>
